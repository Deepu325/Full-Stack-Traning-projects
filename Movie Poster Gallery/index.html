<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Poster Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Poster Gallery</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#movies">Movies</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main id="home">
        <section class="search-section">
            <input type="text" id="search-bar" placeholder="Search movies by name...">
        </section>

        <section class="gallery" id="gallery">
            <!-- Movie posters will be dynamically added here -->
        </section>
    </main>

    <!-- Popup Modal -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-details">
                <img id="modal-poster" src="" alt="Movie Poster">
                <div class="movie-info">
                    <h2 id="modal-title"></h2>
                    <p id="modal-year"></p>
                    <p id="modal-rating"></p>
                    <p id="modal-description"></p>
                </div>
            </div>
        </div>
    </div>

    <footer id="about">
        <p>&copy; 2023 Movie Poster Gallery. All rights reserved.</p>
        <p>About: This is a beginner-friendly movie poster website showcasing a gallery of movies with search functionality.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
