<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Temperature Converter</h1>
            
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <label for="temperatureInput">Enter Temperature:</label>
                    <input 
                        type="number" 
                        id="temperatureInput" 
                        placeholder="Enter value"
                        step="0.01"
                    >
                </div>

                <div class="input-group">
                    <label for="unitSelect">Unit:</label>
                    <select id="unitSelect">
                        <option value="celsius">Celsius (°C)</option>
                        <option value="fahrenheit">Fahrenheit (°F)</option>
                        <option value="kelvin">Kelvin (K)</option>
                    </select>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section">
                <h2>Converted Results:</h2>
                
                <div class="result-box">
                    <div class="result-item">
                        <span class="result-label">Celsius (°C):</span>
                        <span class="result-value" id="celsiusResult">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Fahrenheit (°F):</span>
                        <span class="result-value" id="fahrenheitResult">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Kelvin (K):</span>
                        <span class="result-value" id="kelvinResult">-</span>
                    </div>
                </div>
            </div>

            <!-- Formula Reference -->
            <div class="formula-section">
                <h3>Conversion Formulas:</h3>
                <div class="formula-list">
                    <div class="formula-item">
                        <strong>°F = (°C × 9/5) + 32</strong>
                    </div>
                    <div class="formula-item">
                        <strong>°C = (°F − 32) × 5/9</strong>
                    </div>
                    <div class="formula-item">
                        <strong>K = °C + 273.15</strong>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Test Examples -->
            <div class="examples-section">
                <h3>Quick Test Examples:</h3>
                <div class="examples-list">
                    <button class="example-btn" onclick="testExample(0)">37°C (Body Temp)</button>
                    <button class="example-btn" onclick="testExample(1)">32°F (Freezing)</button>
                    <button class="example-btn" onclick="testExample(2)">273.15K (0°C)</button>
                    <button class="example-btn" onclick="testExample(3)">100°C (Boiling)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
