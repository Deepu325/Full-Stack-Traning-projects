<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Shopping Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav>
            <div class="logo">
                <h1>ShopEasy</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Homepage Section -->
    <section id="home" class="hero">
        <h2>Welcome to ShopEasy</h2>
        <p>Your one-stop shop for amazing products!</p>
    </section>

    <!-- Product Listing Section -->
    <section id="products" class="products">
        <h2>Our Products</h2>
        <div class="product-grid">
            <!-- Product Card 1 -->
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/61ko4A9mefL._AC_SL1500_.jpg" alt="Product 1">
                <h3>Wireless Headphones</h3>
                <p class="price">$49.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <!-- Product Card 2 -->
            <div class="product-card">
                <img src="https://a.storyblok.com/f/165154/1500x700/e7bbe731fa/2_understanding-the-types-of-phone-cases.jpg/m/" alt="Product 2">
                <h3>Smartphone Case</h3>
                <p class="price">$19.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <!-- Product Card 3 -->
            <div class="product-card">
                <img src="https://images-na.ssl-images-amazon.com/images/I/81ZYEVFqDuL._AC_SL1500_.jpg" alt="Product 3">
                <h3>Laptop Stand</h3>
                <p class="price">$29.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <!-- Product Card 4 -->
            <div class="product-card">
                <img src="https://files.cablewholesale.com/hires/10u3-02.jpg" alt="Product 4">
                <h3>USB Cable</h3>
                <p class="price">$9.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2023 ShopEasy. All rights reserved.</p>
        <p>Contact us at: info@shopeasy.com</p>
    </footer>
</body>
</html>
