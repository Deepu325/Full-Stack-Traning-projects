<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - GroceryHub</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">🛒 GroceryHub</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link active">Products</a></li>
                <li><a href="cart.html" class="nav-link">Cart <span id="cartCount" class="badge">0</span></a></li>
                <li id="authMenu">
                    <a href="login.html" class="nav-link btn-login">Login</a>
                    <a href="register.html" class="nav-link btn-register">Register</a>
                </li>
                <li id="userMenuDropdown" style="display:none;">
                    <div class="user-menu">
                        <span id="userName" class="user-name"></span>
                        <button onclick="logoutUser()" class="btn-logout">Logout</button>
                        <a href="order-history.html" class="nav-link">My Orders</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Products Section -->
    <section class="products-section">
        <div class="container">
            <h2>Our Products</h2>
            
            <div class="filters">
                <div class="filter-group">
                    <label for="categoryFilter">Filter by Category:</label>
                    <select id="categoryFilter" onchange="filterByCategory()">
                        <option value="">All Categories</option>
                    </select>
                </div>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded by JavaScript -->
            </div>

            <div id="noProducts" class="no-products" style="display:none;">
                <p>No products found.</p>
            </div>
        </div>
    </section>

    <!-- Product Modal -->
    <div id="productModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- Product details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GroceryHub. All rights reserved. | College Mini Project</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        let allProducts = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            loadCategories();
            updateAuthMenu();
            updateCartCount();
        });

        function loadProducts() {
            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'action=get_products'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    allProducts = data.products;
                    displayProducts(allProducts);
                }
            });
        }

        function loadCategories() {
            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'action=get_categories'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    const categoryFilter = document.getElementById('categoryFilter');
                    data.categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category;
                        option.textContent = category;
                        categoryFilter.appendChild(option);
                    });
                }
            });
        }

        function displayProducts(products) {
            const productsGrid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (products.length === 0) {
                productsGrid.innerHTML = '';
                noProducts.style.display = 'block';
                return;
            }

            noProducts.style.display = 'none';
            productsGrid.innerHTML = '';

            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="../images/${product.image_path}" alt="${product.product_name}" onerror="this.src='https://via.placeholder.com/200'">
                    </div>
                    <h3>${product.product_name}</h3>
                    <p class="category">${product.category}</p>
                    <p class="description">${product.description}</p>
                    <div class="product-footer">
                        <span class="price">₹${parseFloat(product.price).toFixed(2)}</span>
                        <div class="product-actions">
                            <button onclick="viewProduct(${product.product_id})" class="btn btn-sm">View</button>
                            <button onclick="addToCartProduct(${product.product_id})" class="btn btn-sm btn-primary">Add to Cart</button>
                        </div>
                    </div>
                `;
                productsGrid.appendChild(productCard);
            });
        }

        function filterByCategory() {
            const selectedCategory = document.getElementById('categoryFilter').value;
            if (selectedCategory === '') {
                displayProducts(allProducts);
            } else {
                const filteredProducts = allProducts.filter(p => p.category === selectedCategory);
                displayProducts(filteredProducts);
            }
        }

        function viewProduct(productId) {
            const product = allProducts.find(p => p.product_id === productId);
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div class="product-detail">
                    <img src="../images/${product.image_path}" alt="${product.product_name}" onerror="this.src='https://via.placeholder.com/300'">
                    <h2>${product.product_name}</h2>
                    <p class="category">${product.category}</p>
                    <p class="description">${product.description}</p>
                    <p class="stock">Stock Available: ${product.stock_quantity}</p>
                    <div class="price-section">
                        <span class="price-label">Price:</span>
                        <span class="price-value">₹${parseFloat(product.price).toFixed(2)}</span>
                    </div>
                    <div class="quantity-section">
                        <label for="quantityInput">Quantity:</label>
                        <input type="number" id="quantityInput" min="1" max="${product.stock_quantity}" value="1">
                    </div>
                    <button onclick="addToCartWithQuantity(${product.product_id})" class="btn btn-primary btn-block">Add to Cart</button>
                </div>
            `;
            openModal();
        }

        function addToCartProduct(productId) {
            if (!isUserLoggedIn()) {
                alert('Please login first');
                window.location.href = 'login.html';
                return;
            }

            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=add_to_cart&product_id=${productId}&quantity=1`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    alert('Added to cart!');
                    updateCartCount();
                } else {
                    alert(data.message);
                }
            });
        }

        function addToCartWithQuantity(productId) {
            if (!isUserLoggedIn()) {
                alert('Please login first');
                window.location.href = 'login.html';
                return;
            }

            const quantity = parseInt(document.getElementById('quantityInput').value);
            
            if (quantity < 1) {
                alert('Please enter a valid quantity');
                return;
            }

            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=add_to_cart&product_id=${productId}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    alert('Added to cart!');
                    updateCartCount();
                    closeModal();
                } else {
                    alert(data.message);
                }
            });
        }

        function openModal() {
            document.getElementById('productModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
