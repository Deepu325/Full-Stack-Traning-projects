<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - GroceryHub</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">🛒 GroceryHub</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Products</a></li>
                <li><a href="cart.html" class="nav-link active">Cart <span id="cartCount" class="badge">0</span></a></li>
                <li id="authMenu">
                    <a href="login.html" class="nav-link btn-login">Login</a>
                    <a href="register.html" class="nav-link btn-register">Register</a>
                </li>
                <li id="userMenuDropdown" style="display:none;">
                    <div class="user-menu">
                        <span id="userName" class="user-name"></span>
                        <button onclick="logoutUser()" class="btn-logout">Logout</button>
                        <a href="order-history.html" class="nav-link">My Orders</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Shopping Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h2>Your Shopping Cart</h2>

            <div class="cart-container">
                <div class="cart-items" id="cartItems">
                    <!-- Cart items will be loaded here -->
                </div>

                <div class="cart-summary">
                    <div class="summary-card">
                        <h3>Order Summary</h3>
                        <div class="summary-item">
                            <span>Subtotal:</span>
                            <span id="subtotal">₹0.00</span>
                        </div>
                        <div class="summary-item">
                            <span>Delivery:</span>
                            <span>Free</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-item total">
                            <span>Total:</span>
                            <span id="total">₹0.00</span>
                        </div>
                        <form id="checkoutForm" style="display:none;">
                            <div class="form-group">
                                <label for="deliveryAddress">Delivery Address</label>
                                <textarea id="deliveryAddress" required placeholder="Enter your delivery address"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                        </form>
                        <button onclick="showCheckoutForm()" class="btn btn-primary btn-block" id="checkoutBtn">Proceed to Checkout</button>
                    </div>
                </div>
            </div>

            <div id="emptyCartMessage" class="empty-cart" style="display:none;">
                <p>Your cart is empty</p>
                <a href="dashboard.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GroceryHub. All rights reserved. | College Mini Project</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateAuthMenu();
            loadCart();
        });

        function loadCart() {
            if (!isUserLoggedIn()) {
                document.getElementById('cartItems').innerHTML = '<p>Please <a href="login.html">login</a> to view your cart</p>';
                return;
            }

            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'action=get_cart'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status && data.items.length > 0) {
                    displayCartItems(data.items, data.total);
                    document.getElementById('emptyCartMessage').style.display = 'none';
                } else {
                    document.getElementById('cartItems').innerHTML = '';
                    document.getElementById('emptyCartMessage').style.display = 'block';
                    document.getElementById('checkoutBtn').style.display = 'none';
                    document.getElementById('subtotal').textContent = '₹0.00';
                    document.getElementById('total').textContent = '₹0.00';
                }
            });
        }

        function displayCartItems(items, total) {
            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = '';

            items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <img src="../images/${item.image_path}" alt="${item.product_name}" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="item-details">
                        <h4>${item.product_name}</h4>
                        <p>Price: ₹${parseFloat(item.price).toFixed(2)}</p>
                    </div>
                    <div class="item-quantity">
                        <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${item.product_id}, this.value)">
                    </div>
                    <div class="item-total">
                        ₹${itemTotal.toFixed(2)}
                    </div>
                    <button onclick="removeCartItem(${item.product_id})" class="btn-remove">×</button>
                `;
                cartItems.appendChild(cartItem);
            });

            document.getElementById('subtotal').textContent = '₹' + parseFloat(total).toFixed(2);
            document.getElementById('total').textContent = '₹' + parseFloat(total).toFixed(2);
        }

        function updateQuantity(productId, quantity) {
            quantity = parseInt(quantity);
            if (quantity < 1) {
                removeCartItem(productId);
                return;
            }

            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=update_cart&product_id=${productId}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                loadCart();
            });
        }

        function removeCartItem(productId) {
            fetch('../backend/product_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=remove_from_cart&product_id=${productId}`
            })
            .then(response => response.json())
            .then(data => {
                loadCart();
                updateCartCount();
            });
        }

        function showCheckoutForm() {
            document.getElementById('checkoutBtn').style.display = 'none';
            document.getElementById('checkoutForm').style.display = 'block';
        }

        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const deliveryAddress = document.getElementById('deliveryAddress').value;

            if (!deliveryAddress) {
                alert('Please enter delivery address');
                return;
            }

            fetch('../backend/order_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=create_order&delivery_address=${encodeURIComponent(deliveryAddress)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    alert('Order placed successfully! Order ID: ' + data.order_id);
                    window.location.href = 'order-history.html';
                } else {
                    alert(data.message);
                }
            });
        });
    </script>
</body>
</html>
