<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GroceryHub</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">🛒 GroceryHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
                <li><a href="register.html" class="nav-link active">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Form Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Create Your Account</h2>
                <p class="auth-subtitle">Join us and start shopping fresh groceries!</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
                        <span class="error-message" id="fullNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="Choose a username">
                        <span class="error-message" id="usernameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label for="address">Address (Optional)</label>
                        <textarea id="address" name="address" placeholder="Enter your address"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter a strong password">
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <div id="formMessage" class="alert" style="display:none;"></div>

                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GroceryHub. All rights reserved. | College Mini Project</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('full_name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const formMessage = document.getElementById('formMessage');

            // Validation
            if (!fullName || !username || !email || !password) {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'Please fill in all required fields';
                formMessage.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'Passwords do not match';
                formMessage.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'Password must be at least 6 characters long';
                formMessage.style.display = 'block';
                return;
            }

            // Submit form
            fetch('../backend/auth_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=register&username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&full_name=${encodeURIComponent(fullName)}&phone=${encodeURIComponent(phone)}&address=${encodeURIComponent(address)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    formMessage.className = 'alert alert-success';
                    formMessage.textContent = data.message;
                    formMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    formMessage.className = 'alert alert-danger';
                    formMessage.textContent = data.message;
                    formMessage.style.display = 'block';
                }
            })
            .catch(error => {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'An error occurred. Please try again.';
                formMessage.style.display = 'block';
            });
        });
    </script>
</body>
</html>
