<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GroceryHub</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">🛒 GroceryHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="login.html" class="nav-link active">Login</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Login to Your Account</h2>
                <p class="auth-subtitle">Welcome back! Please login to continue shopping.</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div id="formMessage" class="alert" style="display:none;"></div>

                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GroceryHub. All rights reserved. | College Mini Project</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const formMessage = document.getElementById('formMessage');

            // Validation
            if (!email || !password) {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'All fields are required';
                formMessage.style.display = 'block';
                return;
            }

            // Submit form
            fetch('../backend/auth_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    formMessage.className = 'alert alert-success';
                    formMessage.textContent = data.message;
                    formMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    formMessage.className = 'alert alert-danger';
                    formMessage.textContent = data.message;
                    formMessage.style.display = 'block';
                }
            })
            .catch(error => {
                formMessage.className = 'alert alert-danger';
                formMessage.textContent = 'An error occurred. Please try again.';
                formMessage.style.display = 'block';
            });
        });
    </script>
</body>
</html>
