<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - GroceryHub</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 class="logo">🛒 GroceryHub</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Products</a></li>
                <li><a href="cart.html" class="nav-link">Cart <span id="cartCount" class="badge">0</span></a></li>
                <li id="authMenu">
                    <a href="login.html" class="nav-link btn-login">Login</a>
                    <a href="register.html" class="nav-link btn-register">Register</a>
                </li>
                <li id="userMenuDropdown" style="display:none;">
                    <div class="user-menu">
                        <span id="userName" class="user-name"></span>
                        <button onclick="logoutUser()" class="btn-logout">Logout</button>
                        <a href="order-history.html" class="nav-link active">My Orders</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Order History Section -->
    <section class="orders-section">
        <div class="container">
            <h2>My Orders</h2>

            <div id="ordersList" class="orders-list">
                <!-- Orders will be loaded here -->
            </div>

            <div id="noOrdersMessage" class="no-orders" style="display:none;">
                <p>You haven't placed any orders yet.</p>
                <a href="dashboard.html" class="btn btn-primary">Start Shopping</a>
            </div>
        </div>
    </section>

    <!-- Order Details Modal -->
    <div id="orderModal" class="modal" style="display:none;">
        <div class="modal-content large">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <div class="modal-body" id="orderModalBody">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GroceryHub. All rights reserved. | College Mini Project</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateAuthMenu();
            loadOrders();
        });

        function loadOrders() {
            if (!isUserLoggedIn()) {
                document.getElementById('ordersList').innerHTML = '<p>Please <a href="login.html">login</a> to view your orders</p>';
                return;
            }

            fetch('../backend/order_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'action=get_orders'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status && data.orders.length > 0) {
                    displayOrders(data.orders);
                    document.getElementById('noOrdersMessage').style.display = 'none';
                } else {
                    document.getElementById('ordersList').innerHTML = '';
                    document.getElementById('noOrdersMessage').style.display = 'block';
                }
            });
        }

        function displayOrders(orders) {
            const ordersList = document.getElementById('ordersList');
            ordersList.innerHTML = '';

            orders.forEach(order => {
                const orderDate = new Date(order.order_date).toLocaleDateString();
                const statusClass = 'status-' + order.status;
                
                const orderCard = document.createElement('div');
                orderCard.className = 'order-card';
                orderCard.innerHTML = `
                    <div class="order-header">
                        <div class="order-info">
                            <h3>Order #${order.order_id}</h3>
                            <p>Date: ${orderDate}</p>
                        </div>
                        <div class="order-amount">
                            <span class="amount">₹${parseFloat(order.total_amount).toFixed(2)}</span>
                            <span class="status ${statusClass}">${order.status.toUpperCase()}</span>
                        </div>
                    </div>
                    <button onclick="viewOrderDetails(${order.order_id})" class="btn btn-sm">View Details</button>
                `;
                ordersList.appendChild(orderCard);
            });
        }

        function viewOrderDetails(orderId) {
            fetch('../backend/order_api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `action=get_order&order_id=${orderId}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    displayOrderModal(data.order);
                }
            });
        }

        function displayOrderModal(order) {
            const orderDate = new Date(order.order_date).toLocaleDateString();
            const statusClass = 'status-' + order.status;
            
            let itemsHtml = '';
            order.items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                itemsHtml += `
                    <tr>
                        <td>${item.product_name}</td>
                        <td>${item.quantity}</td>
                        <td>₹${parseFloat(item.price).toFixed(2)}</td>
                        <td>₹${itemTotal.toFixed(2)}</td>
                    </tr>
                `;
            });

            const modalBody = document.getElementById('orderModalBody');
            modalBody.innerHTML = `
                <div class="order-detail">
                    <h2>Order Details</h2>
                    <div class="order-meta">
                        <div>
                            <strong>Order ID:</strong> ${order.order_id}
                        </div>
                        <div>
                            <strong>Order Date:</strong> ${orderDate}
                        </div>
                        <div>
                            <strong>Status:</strong> <span class="${statusClass}">${order.status.toUpperCase()}</span>
                        </div>
                    </div>

                    <h3>Items</h3>
                    <table class="order-items-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>

                    <div class="order-summary">
                        <strong>Order Total:</strong> ₹${parseFloat(order.total_amount).toFixed(2)}
                    </div>

                    <h3>Delivery Address</h3>
                    <p>${order.delivery_address}</p>
                </div>
            `;
            openOrderModal();
        }

        function openOrderModal() {
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
