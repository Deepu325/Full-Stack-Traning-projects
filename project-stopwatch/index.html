<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Stopwatch</h1>

    <!-- Display area for the time -->
    <div id="display" class="display">00:00:00</div>

    <!-- Controls -->
    <div class="controls">
      <button id="startStopBtn" class="btn primary">Start</button>
      <button id="resetBtn" class="btn">Reset</button>
    </div>

    <!-- Short instructional note for beginners -->
    <p class="note">Click "Start" to begin, "Start" again (or "Stop") to pause, and "Reset" to set back to zero.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
